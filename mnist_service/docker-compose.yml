services:
  mnist-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: mnist-service:latest
    container_name: mnist-service
    restart: unless-stopped
    environment:
      MODEL_PATH: /app/models/mnist_cnn.pt
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models:ro
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
